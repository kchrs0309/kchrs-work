<title>Protected &mdash; EPI deliverables</title>
<style>html,body{background:#fff;color:#1a1a2e;margin:0;font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
.box{max-width:360px;margin:16vh auto;padding:0 20px}h1{font-size:18px;margin:0 0 14px}
label{display:block;font-size:12px;color:#6b7280;margin:10px 0 3px}
input{width:100%;box-sizing:border-box;padding:9px 10px;border:1px solid #cbd5e1;border-radius:7px;font-size:15px}

</head><body>
<div class="box" id="gate">
  <h1>EPI deliverables &mdash; protected</h1>
  <form id="f" autocomplete="off">
    <label>Username</label><input id="u" autocomplete="username">
    <label>Password</label><input id="p" type="password" autocomplete="current-password">
    <button type="submit">Unlock</button>

</div>
<script id="payload" type="application/json">{"salt":"LuGXstoW8Vkvzd1ziu09Aw==","iv":"JeuWqzlXJyTX9aD3","iter":250000,"ct":"YQWoaReCTROrRRMq3cV2x9fr1H7zCYEa4SvfvLkUAUTbR8AebeJHuHD0c8Wv9PObfiuYX81A7rTBNPG1wwJqvKsECxfjBphgnICdGCTMCjGQ6cCXqFURM2tUqiZdvTVfOME54aL3JOF7QnqJ4b6i1j+cWqp9nojRZgklyzRA6AhuaYEg9vaZ5TmIKay2hJHK3DgOChd5x5ZdO9w3IywlJZxfbtEotKnZzkKDQwQfALl5KegYvqXyT/VX8lyfIZrG0WH5APerrXEDH7v4x80xrIDFP95ADO7GO9+TlYsBiFny1p8pnPSHjCdSKHCPzVjCz8m0fWH0be+mZayQJk53rv7BEhx/S1+lkc0M/DGFtKqPI26HkqEVsXzkCWZcCxT0czkDB+6P3XLFe5pyriLTlEc4iuq2WotwVNB723hqdwxwnxFLH4BEKulU9u533XlBv0q8Vy0V8ZBW2y4GxkRrAU1KJwrVgmFcjHXUivzUZDrDd0JXdu+qLufeuxuh9v5nXPlgWJ4PsOpzZ/cn8aDQaQPVXOfNlaBpQTZE8+gvolE/CctHoy8kIT2Lg8Dh8zfTNVN3R2De93kfVZOeiNHn2wrm7BcqUSf4r9+/SlXnDZcC5nOxUN0S6AkpIKj41OH+iar8odZpoGM/aT18Fqbq37ftCWqJ3G2CxvFslB7ZsrKzKxxECt9R4xVp/noIpj832PUMC5hFEaaMwhNCTdy6sGPm98z9Qlql8jlzwSyS1BWKoOwFFPeDQyPci45ym4HhAlZjzX9u/agqlAVpqUzWtW4FhKc55u5g0KqhivM58thHBNzmU3HvjfgDRBYV9HwyGr0K+5hwwx2HnuI88hRmvYHUk14mgykGzo+EkdVtSI/m3CrSxZi8SLFxl+pPdepPxT5hSswtfloD2LzK9Dg8rqTCYi4KmmR6KWFZnpl7HHJx5l1GfHn47GJdMA=="}</script>
<script>
const D = JSON.parse(document.getElementById("payload").textContent);
const dec = new TextDecoder(), encr = new TextEncoder();
const fromB64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryDecrypt(user, pass){
  const base = await crypto.subtle.importKey("raw", encr.encode(user+"\n"+pass), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({name:"PBKDF2",salt:fromB64(D.salt),iterations:D.iter,hash:"SHA-256"},
    base, {name:"AES-GCM",length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM",iv:fromB64(D.iv)}, key, fromB64(D.ct));
  return dec.decode(pt);
}
function render(html){
  try{ sessionStorage.setItem("epi_u", document.getElementById("u").value||sessionStorage.getItem("epi_u")||"");
       sessionStorage.setItem("epi_p", document.getElementById("p")? (document.getElementById("p").value||sessionStorage.getItem("epi_p")||"") : sessionStorage.getItem("epi_p")||""); }catch(e){}
  document.open(); document.write(html); document.close();
}
document.getElementById("f").addEventListener("submit", async ev => {
  ev.preventDefault();
  const u=document.getElementById("u").value.trim(), p=document.getElementById("p").value;
  try{ const html=await tryDecrypt(u,p); try{sessionStorage.setItem("epi_u",u);sessionStorage.setItem("epi_p",p);}catch(e){} render(html); }
  catch(e){ document.getElementById("e").textContent="Wrong username or password."; }
});
// auto-unlock within the same browser session (single sign-on across pages)
(async () => {
  try{ const u=sessionStorage.getItem("epi_u"), p=sessionStorage.getItem("epi_p");
    if(u&&p){ const html=await tryDecrypt(u,p); render(html); } }catch(e){}
})();
</script>
